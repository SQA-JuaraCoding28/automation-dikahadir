# === Target Application ===
base.url=https://magang.dikahadir.com

# === Browser ===
# Options: chrome | firefox | edge
browser=chrome

# === Headless Mode ===
# Set true for CI, false for local debugging
headless=true

# === Timeouts (seconds) ===
# implicit.wait: keep at 0 — use explicit waits (WebDriverWait) everywhere
implicit.wait=0
standard.wait=15
short.wait=5
page.load.timeout=30

# === Window ===
browser.maximize=true
